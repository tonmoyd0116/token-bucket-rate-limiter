name: Build and Test

on:
  push:
    branches:
      - "feature/**"
      - "config/**"
      - "fix/**"
      - "revert/**"
      - "chore/**"
      - "docs/**"
      - "hotfix/**"

  pull_request:
    branches:
      - develop
      - main

jobs:
  build:
    name: Maven Build, Test and Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build Project
        run: mvn clean verify