name: Build and Test

on:
  push:
    branches:
      - "feature/**"
      - "config/**"
      - "fix/**"
      - "revert/**"
      - "chore/**"
      - "docs/**"
      - "hotfix/**"

  pull_request:
    branches:
      - develop
      - main

jobs:

  validate-pr:
    name: Validate Pull Request Flow
    runs-on: ubuntu-latest

    if: github.event_name == 'pull_request'

    steps:
      - name: Validate Source and Target Branches
        run: |
          echo "Head Branch: ${{ github.head_ref }}"
          echo "Base Branch: ${{ github.base_ref }}"

          if [[ "${{ github.base_ref }}" == "main" && "${{ github.head_ref }}" != "develop" ]]; then
            echo "❌ Only the develop branch can be merged into main."
            exit 1
          fi

          if [[ "${{ github.base_ref }}" == "develop" && "${{ github.head_ref }}" == "develop" ]]; then
            echo "❌ Develop cannot create a PR into itself."
            exit 1
          fi

          echo "✅ Pull request branch strategy is valid."

  build:
    name: Build, Test and Verify

    runs-on: ubuntu-latest

    needs: validate-pr

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build Project
        run: ./mvnw clean verify